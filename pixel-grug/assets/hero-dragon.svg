  </defs>
  <rect width="320" height="240" fill="url(#bg)"/>
  <rect x="36" y="28" width="248" height="184" rx="20" fill="#f8f5ed" stroke="#d9c6aa" stroke-width="4"/>

  <!-- 드래곤 뿔 -->
  <!-- 왼쪽 뿔 -->
  <rect x="104" y="48" width="16" height="24" fill="#facc15" rx="4"/>
