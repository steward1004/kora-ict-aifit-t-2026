<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" shape-rendering="crispEdges">
  <!-- 배경 카드 -->
  <rect width="320" height="240" fill="#ecf4f8"/>
  <rect x="34" y="28" width="252" height="184" rx="20" fill="#ffffff" stroke="#bfd7e6" stroke-width="4"/>

  <!-- 안테나 전구 (노랑/주황 발광) -->
  <rect x="152" y="32" width="16" height="12" fill="#ea580c"/>
  <rect x="156" y="28" width="8" height="16" fill="#facc15"/>
  <rect x="158" y="30" width="4" height="6" fill="#ffffff"/>

  <!-- 안테나 기둥 -->
  <rect x="156" y="44" width="8" height="20" fill="#475569"/>
  <rect x="150" y="60" width="20" height="6" fill="#334155"/>

  <!-- 왼쪽 귀 볼트 -->
  <rect x="68" y="104" width="12" height="24" fill="#475569" rx="3"/>
  <rect x="72" y="112" width="8" height="8" fill="#94a3b8"/>

  <!-- 오른쪽 귀 볼트 -->
  <rect x="240" y="104" width="12" height="24" fill="#475569" rx="3"/>
  <rect x="240" y="112" width="8" height="8" fill="#94a3b8"/>

  <!-- 머리 본체 -->
  <rect x="80" y="66" width="160" height="96" fill="#64748b" rx="16"/>
  
  <!-- 머리 상단 & 좌측 하이라이트 -->
  <rect x="96" y="66" width="128" height="4" fill="#cbd5e1"/>
  <rect x="84" y="70" width="12" height="4" fill="#cbd5e1"/>
  <rect x="80" y="74" width="4" height="78" fill="#cbd5e1"/>

  <!-- 머리 하단 & 우측 그림자 -->
  <rect x="80" y="154" width="160" height="8" fill="#334155" rx="8"/>
  <rect x="236" y="74" width="4" height="78" fill="#334155"/>

  <!-- 얼굴 모니터 화면 -->
  <rect x="100" y="86" width="120" height="54" fill="#1e293b" rx="8"/>
  
  <!-- 모니터 테두리 청색 발광 효과 -->
  <rect x="102" y="88" width="116" height="50" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.6" rx="6"/>

  <!-- 화면 속 눈 (양쪽 반짝이는 파란 눈) -->
  <!-- 왼쪽 눈 -->
  <rect x="120" y="96" width="16" height="16" fill="#0ea5e9" rx="2"/>
  <rect x="120" y="96" width="6" height="6" fill="#ffffff" rx="1"/>
  <!-- 오른쪽 눈 -->
  <rect x="184" y="96" width="16" height="16" fill="#0ea5e9" rx="2"/>
  <rect x="184" y="96" width="6" height="6" fill="#ffffff" rx="1"/>

  <!-- 핑크색 LED 볼터치 -->
  <rect x="108" y="116" width="12" height="6" fill="#f43f5e" rx="1"/>
  <rect x="200" y="116" width="12" height="6" fill="#f43f5e" rx="1"/>

  <!-- 디지털 미소 입 -->
  <rect x="144" y="118" width="32" height="6" fill="#0ea5e9" rx="2"/>
  <rect x="144" y="112" width="6" height="6" fill="#0ea5e9" rx="1"/>
  <rect x="170" y="112" width="6" height="6" fill="#0ea5e9" rx="1"/>

  <!-- 목 및 카라 -->
  <rect x="136" y="148" width="48" height="14" fill="#475569"/>
  <rect x="136" y="154" width="48" height="4" fill="#334155"/>
  <rect x="112" y="162" width="96" height="16" fill="#64748b" rx="4"/>
  <rect x="112" y="174" width="96" height="4" fill="#334155"/>
</svg>
