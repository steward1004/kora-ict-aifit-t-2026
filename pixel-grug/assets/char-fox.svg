<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" shape-rendering="crispEdges">
  <!-- 배경 카드 -->
  <rect width="320" height="240" fill="#f8ead8"/>
  <rect x="34" y="28" width="252" height="184" rx="20" fill="#fff9f3" stroke="#e7c8aa" stroke-width="4"/>

  <!-- 여우 왼쪽 귀 -->
  <rect x="96" y="56" width="8" height="8" fill="#c2410c"/> <!-- 귀 끝 -->
  <rect x="96" y="64" width="16" height="8" fill="#ea580c"/>
  <rect x="104" y="64" width="8" height="8" fill="#fecdd3"/> <!-- 귀 안쪽 핑크 -->
  <rect x="96" y="72" width="24" height="8" fill="#ea580c"/>
  <rect x="104" y="72" width="16" height="8" fill="#fecdd3"/>

  <!-- 여우 오른쪽 귀 -->
  <rect x="216" y="56" width="8" height="8" fill="#c2410c"/>
  <rect x="208" y="64" width="16" height="8" fill="#ea580c"/>
  <rect x="208" y="64" width="8" height="8" fill="#fecdd3"/>
  <rect x="200" y="72" width="24" height="8" fill="#ea580c"/>
  <rect x="200" y="72" width="16" height="8" fill="#fecdd3"/>

  <!-- 머리 베이스 & 이마 -->
  <rect x="112" y="72" width="96" height="8" fill="#f97316"/>
  <rect x="104" y="80" width="112" height="8" fill="#f97316"/>
  <rect x="96" y="88" width="128" height="8" fill="#f97316"/>

  <!-- 머리 상단 하이라이트 -->
  <rect x="120" y="72" width="80" height="3" fill="#fdba74"/>
  <rect x="112" y="80" width="8" height="3" fill="#fdba74"/>

  <!-- 얼굴 뺨과 중앙 영역 -->
  <!-- y=96 -->
  <rect x="96" y="96" width="128" height="8" fill="#f97316"/>
  <rect x="96" y="96" width="16" height="8" fill="#ffffff"/> <!-- 왼쪽 흰 뺨 시작 -->
  <rect x="208" y="96" width="16" height="8" fill="#ffffff"/> <!-- 오른쪽 흰 뺨 시작 -->

  <!-- y=104 -->
  <rect x="96" y="104" width="128" height="8" fill="#f97316"/>
  <rect x="96" y="104" width="24" height="8" fill="#ffffff"/>
  <rect x="200" y="104" width="24" height="8" fill="#ffffff"/>

  <!-- y=112 -->
  <rect x="96" y="112" width="128" height="8" fill="#f97316"/>
  <rect x="96" y="112" width="32" height="8" fill="#ffffff"/>
  <rect x="192" y="112" width="32" height="8" fill="#ffffff"/>

  <!-- y=120 -->
  <rect x="96" y="120" width="128" height="8" fill="#f97316"/>
  <rect x="96" y="120" width="40" height="8" fill="#ffffff"/>
  <rect x="184" y="120" width="40" height="8" fill="#ffffff"/>

  <!-- y=128 -->
  <rect x="96" y="128" width="128" height="8" fill="#f97316"/>
  <rect x="96" y="128" width="48" height="8" fill="#ffffff"/>
  <rect x="176" y="128" width="48" height="8" fill="#ffffff"/>

  <!-- y=136 -->
  <rect x="96" y="136" width="128" height="8" fill="#f97316"/>
  <rect x="96" y="136" width="48" height="8" fill="#ffffff"/>
  <rect x="176" y="136" width="48" height="8" fill="#ffffff"/>

  <!-- y=144 -->
  <rect x="104" y="144" width="112" height="8" fill="#ffffff"/>
  <rect x="104" y="144" width="8" height="8" fill="#ea580c"/> <!-- 옆 그림자 -->
  <rect x="208" y="144" width="8" height="8" fill="#ea580c"/>

  <!-- y=152 (턱 그림자) -->
  <rect x="112" y="152" width="96" height="8" fill="#ea580c"/>
  <rect x="120" y="160" width="80" height="8" fill="#c2410c"/>

  <!-- 눈 -->
  <rect x="120" y="96" width="16" height="16" fill="#0f172a"/>
  <rect x="120" y="96" width="8" height="8" fill="#ffffff"/>
  
  <rect x="184" y="96" width="16" height="16" fill="#0f172a"/>
  <rect x="184" y="96" width="8" height="8" fill="#ffffff"/>

  <!-- 볼터치 -->
  <rect x="104" y="112" width="16" height="8" fill="#fda4af"/>
  <rect x="200" y="112" width="16" height="8" fill="#fda4af"/>

  <!-- 코 -->
  <rect x="148" y="116" width="24" height="12" rx="4" fill="#0f172a"/>
  <rect x="156" y="116" width="8" height="4" fill="#ffffff"/> <!-- 코 하이라이트 -->

  <!-- 입 -->
  <rect x="144" y="132" width="32" height="8" fill="#0f172a"/>
  <rect x="144" y="128" width="12" height="6" fill="#ffffff"/>
  <rect x="164" y="128" width="12" height="6" fill="#ffffff"/>
</svg>
