<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" shape-rendering="crispEdges">
  <!-- 배경 카드 -->
  <rect width="320" height="240" fill="#edf7e3"/>
  <rect x="34" y="28" width="252" height="184" rx="20" fill="#fffdf6" stroke="#c8dcaf" stroke-width="4"/>

  <!-- 슬라임 몸체 베이스 -->
  <rect x="80" y="112" width="160" height="32" fill="#4ade80"/>
  <rect x="88" y="104" width="144" height="8" fill="#4ade80"/>
  <rect x="96" y="96" width="128" height="8" fill="#4ade80"/>
  <rect x="112" y="88" width="96" height="8" fill="#4ade80"/>
  <rect x="128" y="80" width="64" height="8" fill="#4ade80"/>
  <rect x="144" y="72" width="32" height="8" fill="#4ade80"/>
  <rect x="152" y="64" width="16" height="8" fill="#4ade80"/>

  <!-- 탱글탱글 광택 하이라이트 -->
  <rect x="136" y="80" width="8" height="8" fill="#ffffff"/>
  <rect x="144" y="80" width="8" height="8" fill="#bbf7d0"/>
  <rect x="120" y="88" width="8" height="8" fill="#ffffff"/>
  <rect x="128" y="88" width="8" height="8" fill="#bbf7d0"/>
  <rect x="104" y="96" width="8" height="8" fill="#ffffff"/>
  <rect x="112" y="96" width="8" height="8" fill="#bbf7d0"/>

  <!-- 슬라임 하단 그림자 -->
  <rect x="88" y="144" width="144" height="8" fill="#16a34a"/>
  <rect x="96" y="152" width="128" height="8" fill="#15803d"/>
  <rect x="112" y="160" width="96" height="8" fill="#166534"/>

  <!-- 오른쪽 옆면 그림자 (입체감) -->
  <rect x="224" y="104" width="8" height="8" fill="#16a34a"/>
  <rect x="232" y="112" width="8" height="32" fill="#16a34a"/>

  <!-- 눈 (반짝임 포함) -->
  <!-- 왼쪽 눈 -->
  <rect x="112" y="104" width="16" height="16" fill="#14532d"/>
  <rect x="112" y="104" width="8" height="8" fill="#ffffff"/>
  <!-- 오른쪽 눈 -->
  <rect x="192" y="104" width="16" height="16" fill="#14532d"/>
  <rect x="192" y="104" width="8" height="8" fill="#ffffff"/>

  <!-- 분홍색 볼터치 -->
  <rect x="96" y="120" width="16" height="8" fill="#fda4af"/>
  <rect x="208" y="120" width="16" height="8" fill="#fda4af"/>

  <!-- 귀엽게 벌린 입 -->
  <rect x="144" y="120" width="32" height="16" fill="#14532d" rx="4"/>
  <rect x="148" y="128" width="24" height="8" fill="#f43f5e" rx="2"/> <!-- 혀 -->
  
  <!-- 입 미소 라인을 위한 덮개 픽셀 -->
  <rect x="144" y="120" width="8" height="6" fill="#4ade80"/>
  <rect x="168" y="120" width="8" height="6" fill="#4ade80"/>
</svg>
