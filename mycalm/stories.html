<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Stories - MyCalm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <a href="index.html" class="btn-back">
        <span>◀</span> 홈으로
      </a>
      <div class="app-logo">MyCalm</div>
    </header>

    <!-- Header info card -->
    <section class="glass-card" style="padding: 1.5rem; text-align: center;">
      <h2 style="font-size: 1.3rem; font-weight: 700; margin-bottom: 0.4rem;">수면 유도 오디오</h2>
      <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;">
        마음의 안정을 돕는 소리 치료 세션입니다.<br>
        <strong>오디오를 끝까지 감상하셔야</strong> 수면 완료 로그가 기록됩니다.
      </p>
    </section>

    <!-- Story Cards Container -->
    <main class="story-list" id="stories-container">
      <!-- Cards will be generated dynamically by js/stories.js -->
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 MyCalm. All rights reserved.</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/background.js"></script>
  <script src="js/stories.js"></script>
</body>
</html>
