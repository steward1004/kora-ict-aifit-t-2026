<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 루틴 - MyCalm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <a href="index.html" class="btn-back">
        <span>◀</span> 홈으로
      </a>
      <div class="app-logo">MyCalm</div>
    </header>

    <!-- Bedtime Alarm Settings Card -->
    <section class="glass-card">
      <div class="sleep-time-box">
        <h3 style="font-size: 1.15rem; font-weight: 700;">🌙 취침 알림 설정</h3>
        <button class="btn-save-time" id="btn-request-notification">알림 권한 허용</button>
      </div>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.4;">
        설정한 시간이 되면 브라우저 팝업 알림으로 수면 준비를 리마인드합니다.<br>
        (웹 브라우저 탭이 열려 있어야 작동합니다.)
      </p>
      
      <div class="time-picker-wrapper">
        <input type="time" class="time-input" id="sleep-time-input" value="23:00">
        <button class="btn-save-time" id="btn-save-sleep-time">시간 저장</button>
      </div>
    </section>

    <!-- Routine Todo Checklist Card -->
    <main class="glass-card" style="display: flex; flex-direction: column; gap: 1.2rem;">
      <h3 style="font-size: 1.15rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center;">
        <span>📝 취침 루틴 체크리스트</span>
        <span style="font-size: 0.8rem; color: var(--lavender-medium);" id="routine-streak-txt">연속 0일</span>
      </h3>

      <!-- Add New Routine Item Form -->
      <form class="routine-input-form" id="routine-add-form">
        <input 
          type="text" 
          class="routine-input" 
          id="routine-input" 
          placeholder="나만의 힐링 루틴 추가..." 
          required 
          autocomplete="off"
        >
        <button type="submit" class="btn-add-routine" title="추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </form>

      <!-- Routine List Container -->
      <ul class="routine-list" id="routine-list-container">
        <!-- Rendered dynamically by js/routine.js -->
      </ul>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 MyCalm. All rights reserved.</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/background.js"></script>
  <script src="js/routine.js"></script>
</body>
</html>
