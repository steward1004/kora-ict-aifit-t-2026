<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <style>
      :root {
        --bg: #111827;
        --panel: #1f2937;
        --accent: #ef4444;
        --accent-soft: #f87171;
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: #374151;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .app {
        width: min(900px, 100%);
        display: grid;
        gap: 24px;
      }

      .panel {
        background: rgba(31, 41, 55, 0.95);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        padding: 24px;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      .timer-box {
        text-align: center;
      }

      .mode-switch {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .mode-btn {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #374151;
        color: var(--text);
        cursor: pointer;
        transition: 0.2s;
      }

      .mode-btn.active {
        background: var(--accent);
        border-color: var(--accent);
      }

      .time {
        font-size: clamp(3.5rem, 8vw, 6.5rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        margin: 14px 0 20px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .start-btn {
        background: var(--accent);
        color: white;
      }

      .pause-btn {
        background: #f59e0b;
        color: white;
      }

      .reset-btn {
        background: #6b7280;
        color: white;
      }

      .status {
        color: var(--muted);
        margin-top: 10px;
      }

      .todo-form {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      .todo-form input {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 12px 14px;
        background: #111827;
        color: var(--text);
      }

      .todo-form button {
        background: var(--accent);
        color: white;
      }

      .todo-list {
        list-style: none;
        padding: 0;
        margin: 18px 0 0;
        display: grid;
        gap: 10px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        background: #111827;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .todo-item.left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .todo-item.completed span {
        text-decoration: line-through;
        color: var(--muted);
      }

      .delete-btn {
        background: transparent;
        color: var(--accent-soft);
        padding: 6px 10px;
      }

      .summary {
        color: var(--muted);
        font-size: 0.95rem;
        margin-top: 8px;
      }

      @media (max-width: 640px) {
        .panel {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel timer-box">
        <h1>포모도로 타이머</h1>
        <div class="mode-switch" role="group" aria-label="타이머 모드 선택">
          <button class="mode-btn active" data-mode="work">작업</button>
          <button class="mode-btn" data-mode="short">짧은 휴식</button>
          <button class="mode-btn" data-mode="long">긴 휴식</button>
        </div>
        <div id="time" class="time">25:00</div>
        <div class="controls">
          <button id="startBtn" class="start-btn">시작</button>
          <button id="pauseBtn" class="pause-btn">일시정지</button>
          <button id="resetBtn" class="reset-btn">리셋</button>
        </div>
        <p id="status" class="status">작업 시간입니다. 집중해보세요!</p>
      </section>

      <section class="panel">
        <h2>할 일 목록</h2>
        <form id="todoForm" class="todo-form">
          <input id="todoInput" type="text" maxlength="80" placeholder="할 일을 입력하세요" required />
          <button type="submit">추가</button>
        </form>
        <p id="todoSummary" class="summary">0개 항목</p>
        <ul id="todoList" class="todo-list"></ul>
      </section>
    </main>

    <script>
      const durations = {
        work: 25 * 60,
        short: 5 * 60,
        long: 15 * 60,
      };

      const modeButtons = document.querySelectorAll('.mode-btn');
      const timeEl = document.getElementById('time');
      const statusEl = document.getElementById('status');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');
      const todoForm = document.getElementById('todoForm');
      const todoInput = document.getElementById('todoInput');
      const todoList = document.getElementById('todoList');
      const todoSummary = document.getElementById('todoSummary');

      let currentMode = 'work';
      let timeLeft = durations[currentMode];
      let timerId = null;
      let isRunning = false;

      function formatTime(seconds) {
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        return `${m}:${s}`;
      }

      function updateTimerDisplay() {
        timeEl.textContent = formatTime(timeLeft);
      }

      function updateStatusText() {
        const labels = {
          work: '작업 시간입니다. 집중해보세요!',
          short: '짧은 휴식 시간입니다. 몸을 풀어주세요.',
          long: '긴 휴식 시간입니다. 천천히 쉬어가세요.',
        };
        statusEl.textContent = labels[currentMode];
      }

      function setMode(mode) {
        currentMode = mode;
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
        timeLeft = durations[mode];
        updateTimerDisplay();
        updateStatusText();
        modeButtons.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        startBtn.textContent = '시작';
      }

      function startTimer() {
        if (isRunning) return;
        isRunning = true;
        startBtn.textContent = '진행 중';
        timerId = setInterval(() => {
          timeLeft -= 1;
          updateTimerDisplay();
          if (timeLeft <= 0) {
            clearInterval(timerId);
            isRunning = false;
            startBtn.textContent = '시작';
            if (currentMode === 'work') {
              setMode('short');
            } else {
              setMode('work');
            }
            statusEl.textContent = '세션이 끝났습니다. 다음 사이클로 넘어갑니다.';
          }
        }, 1000);
      }

      function pauseTimer() {
        if (!isRunning) return;
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
        startBtn.textContent = '시작';
      }

      function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
        timeLeft = durations[currentMode];
        updateTimerDisplay();
        updateStatusText();
        startBtn.textContent = '시작';
      }

      startBtn.addEventListener('click', startTimer);
      pauseBtn.addEventListener('click', pauseTimer);
      resetBtn.addEventListener('click', resetTimer);

      modeButtons.forEach((btn) => {
        btn.addEventListener('click', () => setMode(btn.dataset.mode));
      });

      const STORAGE_KEY = 'pomodoro-todos';
      let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

      function saveTodos() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }

      function renderTodos() {
        todoList.innerHTML = '';
        if (todos.length === 0) {
          const empty = document.createElement('li');
          empty.className = 'summary';
          empty.textContent = '아직 할 일이 없습니다.';
          todoList.appendChild(empty);
        } else {
          todos.forEach((todo) => {
            const item = document.createElement('li');
            item.className = `todo-item${todo.completed ? ' completed' : ''}`;
            item.innerHTML = `
              <div class="left">
                <input type="checkbox" ${todo.completed ? 'checked' : ''} />
                <span>${todo.text}</span>
              </div>
              <button class="delete-btn" type="button">삭제</button>
            `;

            const checkbox = item.querySelector('input');
            checkbox.addEventListener('change', () => {
              todo.completed = checkbox.checked;
              saveTodos();
              renderTodos();
            });

            item.querySelector('.delete-btn').addEventListener('click', () => {
              todos = todos.filter((entry) => entry.id !== todo.id);
              saveTodos();
              renderTodos();
            });

            todoList.appendChild(item);
          });
        }
        const remaining = todos.filter((todo) => !todo.completed).length;
        todoSummary.textContent = `${todos.length}개 항목 · 완료됨 ${todos.length - remaining}개`;
      }

      todoForm.addEventListener('submit', (event) => {
        event.preventDefault();
        const text = todoInput.value.trim();
        if (!text) return;
        todos.unshift({
          id: Date.now().toString(),
          text,
          completed: false,
        });
        saveTodos();
        renderTodos();
        todoForm.reset();
      });

      updateTimerDisplay();
      updateStatusText();
      renderTodos();
    </script>
  </body>
</html>
