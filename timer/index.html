<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIFit 포모도로 타이머 & 할 일 목록</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* CSS Variables & Themes */
    :root {
      --color-work: #ff6b6b;
      --color-work-rgb: 255, 107, 107;
      --color-work-glow: rgba(255, 107, 107, 0.4);
      
      --color-short: #20c997;
      --color-short-rgb: 32, 201, 151;
      --color-short-glow: rgba(32, 201, 151, 0.4);
      
      --color-long: #339af0;
      --color-long-rgb: 51, 154, 240;
      --color-long-glow: rgba(51, 154, 240, 0.4);

      /* Default theme starts with Work mode */
      --theme-color: var(--color-work);
      --theme-color-rgb: var(--color-work-rgb);
      --theme-glow: var(--color-work-glow);
      
      --bg-dark-1: #0f172a;
      --bg-dark-2: #1e1b4b;
      --bg-dark-3: #311042;
      
      --card-bg: rgba(15, 23, 42, 0.35);
      --card-border: rgba(255, 255, 255, 0.07);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --transition-speed: 0.4s;
    }

    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark-1) 0%, var(--bg-dark-2) 50%, var(--bg-dark-3) 100%);
      background-size: 400% 400%;
      animation: auroraBackground 20s ease infinite;
      min-height: 100vh;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    @keyframes auroraBackground {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Layout Wrapper */
    .container {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 2rem;
      align-items: start;
      z-index: 10;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        max-width: 550px;
      }
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      z-index: 10;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 2.5rem;
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #ffffff, var(--theme-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: background var(--transition-speed) ease;
      display: inline-block;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-top: 0.5rem;
      font-weight: 400;
    }

    /* Glassmorphism Card Style */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
    }

    .glass-card:hover {
      border-color: rgba(var(--theme-color-rgb), 0.2);
      box-shadow: 0 20px 40px rgba(var(--theme-color-rgb), 0.05);
    }

    /* -------------------------------------
       1. POMODORO TIMER UI
       ------------------------------------- */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Mode Navigation Tabs */
    .mode-nav {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.4rem;
      border-radius: 100px;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      width: 100%;
      max-width: 380px;
      position: relative;
    }

    .mode-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 0.8rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 100px;
      transition: color 0.3s ease, background-color 0.3s ease;
      text-align: center;
      outline: none;
      z-index: 2;
    }

    .mode-btn.active {
      color: var(--text-primary);
      background: rgba(var(--theme-color-rgb), 0.15);
      box-shadow: inset 0 0 12px rgba(var(--theme-color-rgb), 0.1);
    }

    /* Progress Ring & Timer Display */
    .timer-visual {
      position: relative;
      width: 290px;
      height: 290px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .progress-ring {
      position: absolute;
      top: 0;
      left: 0;
      transform: rotate(-90deg);
      transform-origin: center;
    }

    .progress-ring__circle {
      transition: stroke-dashoffset 0.1s linear, stroke var(--transition-speed) ease;
    }

    .timer-text-container {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .timer-countdown {
      font-family: 'Outfit', monospace;
      font-weight: 700;
      font-size: 4rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      text-shadow: 0 0 20px rgba(var(--theme-color-rgb), 0.2);
      transition: text-shadow var(--transition-speed) ease;
    }

    .timer-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-weight: 600;
    }

    /* Timer Controls */
    .timer-controls {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .btn-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      cursor: pointer;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-control-main {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--theme-color);
      color: #0f172a;
      border: none;
      box-shadow: 0 8px 24px var(--theme-glow);
    }

    .btn-control-main:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 30px var(--theme-glow);
    }

    .btn-control-main:active {
      transform: scale(0.95);
    }

    .btn-control-sub {
      width: 52px;
      height: 52px;
      border-radius: 50%;
    }

    .btn-control-sub:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(var(--theme-color-rgb), 0.3);
      color: var(--theme-color);
      transform: translateY(-2px);
    }

    .btn-control-sub:active {
      transform: translateY(0);
    }

    .btn-control svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .btn-control-main svg {
      width: 26px;
      height: 26px;
    }

    /* -------------------------------------
       2. TODO LIST UI
       ------------------------------------- */
    .todo-section {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .todo-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Progress Bar */
    .todo-progress-container {
      margin-bottom: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .todo-progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .todo-progress-bar-bg {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      overflow: hidden;
    }

    .todo-progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--theme-color), rgba(var(--theme-color-rgb), 0.5));
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition-speed) ease;
    }

    /* Todo Input Box */
    .todo-input-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .todo-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 0.9rem 1.2rem;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .todo-input:focus {
      border-color: var(--theme-color);
      box-shadow: 0 0 15px rgba(var(--theme-color-rgb), 0.15);
      background: rgba(0, 0, 0, 0.3);
    }

    .todo-input::placeholder {
      color: var(--text-muted);
    }

    .todo-add-btn {
      background: var(--theme-color);
      color: #0f172a;
      border: none;
      border-radius: 14px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px var(--theme-glow);
    }

    .todo-add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px var(--theme-glow);
    }

    .todo-add-btn:active {
      transform: translateY(0);
    }

    .todo-add-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.5;
    }

    /* Todo List Items */
    .todo-list {
      list-style: none;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    /* Custom Scrollbar for list */
    .todo-list::-webkit-scrollbar {
      width: 6px;
    }

    .todo-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .todo-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .todo-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 0.9rem 1.2rem;
      border-radius: 14px;
      margin-bottom: 0.75rem;
      transition: all 0.3s ease;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .todo-item.fade-out {
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }

    .todo-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .todo-item-left {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex: 1;
    }

    /* Checkbox styling */
    .todo-checkbox-wrapper {
      position: relative;
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .todo-checkbox-hidden {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }

    .todo-checkbox-custom {
      position: absolute;
      top: 0;
      left: 0;
      height: 20px;
      width: 20px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .todo-checkbox-wrapper:hover .todo-checkbox-custom {
      border-color: var(--theme-color);
      background-color: rgba(var(--theme-color-rgb), 0.05);
    }

    .todo-checkbox-hidden:checked ~ .todo-checkbox-custom {
      background-color: var(--theme-color);
      border-color: var(--theme-color);
    }

    .todo-checkbox-custom::after {
      content: "";
      position: absolute;
      display: none;
      left: 6px;
      top: 2px;
      width: 5px;
      height: 10px;
      border: solid #0f172a;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .todo-checkbox-hidden:checked ~ .todo-checkbox-custom::after {
      display: block;
    }

    .todo-text {
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: all 0.3s ease;
      user-select: none;
      word-break: break-all;
      padding-right: 0.5rem;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .todo-delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      opacity: 0.6;
    }

    .todo-item:hover .todo-delete-btn {
      opacity: 1;
    }

    .todo-delete-btn:hover {
      background: rgba(255, 107, 107, 0.1);
      color: #ff6b6b;
      transform: scale(1.1);
    }

    .todo-delete-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* Empty State */
    .todo-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      text-align: center;
      color: var(--text-muted);
      animation: fadeIn 0.4s ease-out;
    }

    .todo-empty-state svg {
      width: 48px;
      height: 48px;
      stroke: currentColor;
      stroke-width: 1.5;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .todo-empty-state p {
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Footer */
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      z-index: 10;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--theme-color);
    }
  </style>
</head>
<body>

  <header>
    <h1 id="app-title">AIFit Pomodoro</h1>
    <p>집중과 휴식의 균형을 통한 몰입의 시간</p>
  </header>

  <main class="container">
    <!-- Left Section: Pomodoro Timer -->
    <section class="glass-card timer-section">
      <!-- Mode Selection Tabs -->
      <nav class="mode-nav" aria-label="Timer modes">
        <button class="mode-btn active" data-mode="work">집중 (25m)</button>
        <button class="mode-btn" data-mode="short">짧은 휴식 (5m)</button>
        <button class="mode-btn" data-mode="long">긴 휴식 (15m)</button>
      </nav>

      <!-- SVG Circular Progress Ring -->
      <div class="timer-visual">
        <svg class="progress-ring" width="290" height="290">
          <!-- Background circle track -->
          <circle
            class="progress-ring__bg"
            stroke="rgba(255, 255, 255, 0.03)"
            stroke-width="6"
            fill="transparent"
            r="135"
            cx="145"
            cy="145"
          />
          <!-- Active progressive circle -->
          <circle
            class="progress-ring__circle"
            stroke="var(--theme-color)"
            stroke-width="8"
            stroke-linecap="round"
            fill="transparent"
            r="135"
            cx="145"
            cy="145"
            stroke-dasharray="848.23"
            stroke-dashoffset="0"
          />
        </svg>
        <div class="timer-text-container">
          <div class="timer-countdown" id="time-display">25:00</div>
          <div class="timer-label" id="timer-label">Focus Time</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="timer-controls">
        <!-- Settings/Reset button -->
        <button class="btn-control btn-control-sub" id="btn-reset" title="타이머 초기화">
          <svg viewBox="0 0 24 24">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
        
        <!-- Main Play/Pause button -->
        <button class="btn-control btn-control-main" id="btn-play-pause" title="시작">
          <!-- Play Icon -->
          <svg id="icon-play" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <!-- Pause Icon (hidden by default) -->
          <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <!-- Skip to next button -->
        <button class="btn-control btn-control-sub" id="btn-skip" title="다음 단계로 건너뛰기">
          <svg viewBox="0 0 24 24">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Right Section: Todo List -->
    <section class="glass-card todo-section">
      <div class="todo-title">
        <span>할 일 목록</span>
      </div>

      <!-- Completion Progress Bar -->
      <div class="todo-progress-container">
        <div class="todo-progress-info">
          <span>오늘의 진행률</span>
          <span id="todo-progress-text">0% (0 / 0)</span>
        </div>
        <div class="todo-progress-bar-bg">
          <div class="todo-progress-bar-fill" id="todo-progress-fill"></div>
        </div>
      </div>

      <!-- Add Todo Form -->
      <form class="todo-input-form" id="todo-form">
        <input 
          type="text" 
          class="todo-input" 
          id="todo-input" 
          placeholder="어떤 일을 완료해 볼까요?" 
          required 
          autocomplete="off"
        >
        <button type="submit" class="todo-add-btn" title="할 일 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </form>

      <!-- Todo Items Container -->
      <ul class="todo-list" id="todo-list">
        <!-- Appended programmatically -->
      </ul>

      <!-- Empty State -->
      <div class="todo-empty-state" id="todo-empty" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9 11l3 3L22 4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>오늘 등록된 할 일이 없네요.<br>새로운 목표를 추가하고 집중해보세요!</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 AIFit. Designed for Focus & Health.</p>
  </footer>

  <script>
    /* -------------------------------------
       STATE MANAGEMENT
       ------------------------------------- */
    const MODE_SETTINGS = {
      work: {
        minutes: 25,
        label: 'Focus Time',
        themeColor: 'var(--color-work)',
        themeColorRgb: 'var(--color-work-rgb)',
        themeGlow: 'var(--color-work-glow)'
      },
      short: {
        minutes: 5,
        label: 'Short Break',
        themeColor: 'var(--color-short)',
        themeColorRgb: 'var(--color-short-rgb)',
        themeGlow: 'var(--color-short-glow)'
      },
      long: {
        minutes: 15,
        label: 'Long Break',
        themeColor: 'var(--color-long)',
        themeColorRgb: 'var(--color-long-rgb)',
        themeGlow: 'var(--color-long-glow)'
      }
    };

    let currentMode = 'work';
    let isRunning = false;
    let timerId = null;
    let secondsRemaining = MODE_SETTINGS.work.minutes * 60;
    let totalSecondsForMode = MODE_SETTINGS.work.minutes * 60;
    
    // Todos state
    let todos = [];

    // Audio Context for synthesizing a gentle bell chime (to avoid loading external mp3 files)
    let audioCtx = null;

    /* -------------------------------------
       DOM ELEMENTS
       ------------------------------------- */
    // Timer DOMs
    const timeDisplay = document.getElementById('time-display');
    const timerLabel = document.getElementById('timer-label');
    const btnPlayPause = document.getElementById('btn-play-pause');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const btnReset = document.getElementById('btn-reset');
    const btnSkip = document.getElementById('btn-skip');
    const modeButtons = document.querySelectorAll('.mode-btn');
    const progressCircle = document.querySelector('.progress-ring__circle');
    const appTitle = document.getElementById('app-title');

    // Todo DOMs
    const todoForm = document.getElementById('todo-form');
    const todoInput = document.getElementById('todo-input');
    const todoListContainer = document.getElementById('todo-list');
    const todoEmptyState = document.getElementById('todo-empty');
    const todoProgressText = document.getElementById('todo-progress-text');
    const todoProgressFill = document.getElementById('todo-progress-fill');

    // Circle Circumference ($2 * \pi * r$) where r = 135 -> ~848.23
    const CIRCLE_CIRCUMFERENCE = 848.23;
    progressCircle.style.strokeDasharray = CIRCLE_CIRCUMFERENCE;

    /* -------------------------------------
       SOUND GENERATOR (Web Audio API)
       ------------------------------------- */
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playNotificationSound() {
      initAudio();
      if (!audioCtx) return;

      // Resume context if suspended (browser security autoplays block)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      // Simple synthesized crystal bell sound (2 tones)
      const now = audioCtx.currentTime;
      
      const playTone = (freq, startTime, duration) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        
        // Add a bit of harmonics for rich metal chime
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq * 1.5, startTime);
        
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

        osc.connect(gainNode);
        osc2.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start(startTime);
        osc2.start(startTime);
        osc.stop(startTime + duration);
        osc2.stop(startTime + duration);
      };

      // Play double bell chime
      playTone(523.25, now, 1.2); // C5
      playTone(659.25, now + 0.25, 1.5); // E5
    }

    /* -------------------------------------
       TIMER LOGIC
       ------------------------------------- */
    function setTimerTheme(mode) {
      const settings = MODE_SETTINGS[mode];
      
      // Update CSS Variables dynamically
      document.documentElement.style.setProperty('--theme-color', settings.themeColor);
      document.documentElement.style.setProperty('--theme-color-rgb', settings.themeColorRgb);
      document.documentElement.style.setProperty('--theme-glow', settings.themeGlow);
      
      // Update Label
      timerLabel.textContent = settings.label;
    }

    function switchMode(mode) {
      // Clean up previous timer
      stopTimer();
      
      currentMode = mode;
      
      // Update UI active buttons
      modeButtons.forEach(btn => {
        if (btn.dataset.mode === mode) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      // Update constants for remaining time
      secondsRemaining = MODE_SETTINGS[mode].minutes * 60;
      totalSecondsForMode = secondsRemaining;

      setTimerTheme(mode);
      updateTimerDisplay();
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(secondsRemaining / 60);
      const seconds = secondsRemaining % 60;
      
      const formattedMin = String(minutes).padStart(2, '0');
      const formattedSec = String(seconds).padStart(2, '0');
      
      // Update Main Timer Text
      timeDisplay.textContent = `${formattedMin}:${formattedSec}`;
      
      // Update Document Title
      document.title = `(${formattedMin}:${formattedSec}) AIFit Pomodoro`;

      // Update Circle Progress Dashoffset
      const percentLeft = secondsRemaining / totalSecondsForMode;
      // Make sure it doesn't drop below 0 or exceed 1
      const clampedPercent = Math.max(0, Math.min(1, percentLeft));
      const dashoffset = CIRCLE_CIRCUMFERENCE * (1 - clampedPercent);
      progressCircle.style.strokeDashoffset = dashoffset;
    }

    function startTimer() {
      initAudio(); // Initialize audio context on user interaction
      isRunning = true;
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
      btnPlayPause.title = '일시정지';
      
      timerId = setInterval(() => {
        if (secondsRemaining > 0) {
          secondsRemaining--;
          updateTimerDisplay();
        } else {
          handleTimerExpiry();
        }
      }, 1000);
    }

    function stopTimer() {
      isRunning = false;
      iconPlay.style.display = 'block';
      iconPause.style.display = 'none';
      btnPlayPause.title = '시작';

      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function handleTimerExpiry() {
      stopTimer();
      playNotificationSound();

      // Show temporary alert & automatically switch modes
      setTimeout(() => {
        alert(`${MODE_SETTINGS[currentMode].label} 세션이 종료되었습니다!`);
        
        // Auto progress flow: work -> short break -> work -> short break -> work -> long break
        if (currentMode === 'work') {
          // Check how many intervals done or suggest short break
          switchMode('short');
        } else {
          switchMode('work');
        }
      }, 100);
    }

    function resetTimer() {
      stopTimer();
      secondsRemaining = MODE_SETTINGS[currentMode].minutes * 60;
      totalSecondsForMode = secondsRemaining;
      updateTimerDisplay();
    }

    function skipTimer() {
      stopTimer();
      // Cycle: work -> short -> long -> work
      let nextMode = 'work';
      if (currentMode === 'work') nextMode = 'short';
      else if (currentMode === 'short') nextMode = 'long';
      
      switchMode(nextMode);
    }

    /* -------------------------------------
       TODO LIST LOGIC
       ------------------------------------- */
    function saveTodos() {
      localStorage.setItem('aifit_pomodoro_todos', JSON.stringify(todos));
    }

    function loadTodos() {
      const stored = localStorage.getItem('aifit_pomodoro_todos');
      if (stored) {
        try {
          todos = JSON.parse(stored);
        } catch (e) {
          todos = [];
        }
      }
      renderTodos();
    }

    function updateProgress() {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      
      const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
      
      todoProgressFill.style.width = `${percentage}%`;
      todoProgressText.textContent = `${percentage}% (${completed} / ${total})`;
    }

    function renderTodos() {
      todoListContainer.innerHTML = '';
      
      if (todos.length === 0) {
        todoEmptyState.style.display = 'flex';
        todoListContainer.style.display = 'none';
      } else {
        todoEmptyState.style.display = 'none';
        todoListContainer.style.display = 'block';

        todos.forEach(todo => {
          const li = document.createElement('li');
          li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
          li.dataset.id = todo.id;

          li.innerHTML = `
            <div class="todo-item-left">
              <label class="todo-checkbox-wrapper">
                <input type="checkbox" class="todo-checkbox-hidden" ${todo.completed ? 'checked' : ''}>
                <span class="todo-checkbox-custom"></span>
              </label>
              <span class="todo-text">${escapeHtml(todo.text)}</span>
            </div>
            <button class="todo-delete-btn" title="삭제">
              <svg viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          `;

          // Bind checkbox toggle event
          const checkbox = li.querySelector('.todo-checkbox-hidden');
          checkbox.addEventListener('change', () => toggleTodo(todo.id));

          // Bind delete event
          const deleteBtn = li.querySelector('.todo-delete-btn');
          deleteBtn.addEventListener('click', () => deleteTodo(todo.id, li));

          todoListContainer.appendChild(li);
        });
      }
      
      updateProgress();
    }

    function addTodo(text) {
      if (!text.trim()) return;

      const newTodo = {
        id: Date.now().toString(),
        text: text.trim(),
        completed: false
      };

      todos.push(newTodo);
      saveTodos();
      renderTodos();
    }

    function toggleTodo(id) {
      todos = todos.map(todo => {
        if (todo.id === id) {
          return { ...todo, completed: !todo.completed };
        }
        return todo;
      });
      saveTodos();
      renderTodos();
    }

    function deleteTodo(id, element) {
      // Add fade-out animation before removal
      element.classList.add('fade-out');
      element.addEventListener('transitionend', () => {
        todos = todos.filter(todo => todo.id !== id);
        saveTodos();
        renderTodos();
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    /* -------------------------------------
       EVENT LISTENERS
       ------------------------------------- */
    // Timer Events
    btnPlayPause.addEventListener('click', () => {
      if (isRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    });

    btnReset.addEventListener('click', resetTimer);
    btnSkip.addEventListener('click', skipTimer);

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        switchMode(mode);
      });
    });

    // Todo Events
    todoForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = todoInput.value;
      if (val) {
        addTodo(val);
        todoInput.value = '';
        todoInput.focus();
      }
    });

    /* -------------------------------------
       INITIALIZATION
       ------------------------------------- */
    // Trigger initial settings
    switchMode('work');
    loadTodos();
  </script>
</body>
</html>
